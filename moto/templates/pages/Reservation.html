{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTO RAGE | Booking Confirmation</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-red: #ff3e3e; 
            --dark-red: #cc2a2a;
            --pure-black: #0f0f0f;
            --card-bg: rgba(26, 26, 26, 0.85); 
            --white: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --text-gray: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, rgba(15, 15, 15, 0.85), rgba(44, 17, 17, 0.75)), url("{% static 'img/image.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* تعديل الحاوية لتصبح عريضة ومودرن */
        .form-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 850px; /* تم تكبير العرض هنا من 650px إلى 850px */
            padding: 60px;    /* زيادة الحشو الداخلي ليناسب العرض الجديد */
            border-radius: 32px;
            box-shadow: 0 35px 70px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 62, 62, 0.15); 
            position: relative;
            overflow: hidden;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .form-card:hover {
            border-color: rgba(255, 62, 62, 0.3);
            box-shadow: 0 35px 70px rgba(255, 62, 62, 0.15);
        }

        .form-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-red), #ff8e8e);
        }

        header {
            text-align: center;
            margin-bottom: 45px;
        }

        header h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        header h2 span {
            background: linear-gradient(90deg, var(--primary-red), #ff8e8e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1rem;
            color: var(--text-gray);
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 28px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 12px;
            color: var(--white);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            padding: 18px; /* جعل الحقول أضخم قليلاً لتناسب العرض */
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 1rem;
            color: var(--white);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1) sepia(100%) saturate(500%) hue-rotate(310deg); 
            cursor: pointer;
        }

        .form-control:focus {
            border-color: var(--primary-red);
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.25);
        }

        select.form-control option {
            background: #161616;
            color: var(--white);
        }

        /* توزيع الحقول بالتساوي داخل العرض الكبير */
        .name-row {
            display: flex;
            gap: 25px;
        }

        .name-row .form-group {
            flex: 1;
        }

        .btn-submit {
            width: 100%;
            padding: 20px;
            background: var(--primary-red);
            color: var(--white);
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.15rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 20px;
            box-shadow: 0 12px 28px rgba(255, 62, 62, 0.35);
        }

        .btn-submit:hover {
            background: var(--dark-red);
            transform: translateY(-4px);
            box-shadow: 0 18px 35px rgba(255, 62, 62, 0.5);
        }

        .btn-submit:active {
            transform: translateY(-1px);
        }

        .message {
            color: #ff4d4d;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            background: rgba(255, 62, 62, 0.1);
            border: 1px solid rgba(255, 62, 62, 0.2);
            padding: 14px;
            border-radius: 14px;
            font-size: 0.95rem;
        }

        footer {
            margin-top: 45px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 30px;
        }

        footer p {
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        footer p strong {
            color: var(--white);
        }

        .social-links {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            color: var(--text-gray);
            font-size: 1.4rem;
            transition: 0.3s ease;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .social-links a:hover { 
            transform: translateY(-5px); 
            color: var(--white);
            background: var(--primary-red);
        }

        @media (max-width: 768px) {
            .name-row {
                flex-direction: column;
                gap: 0;
            }
            .form-card {
                padding: 40px 24px;
                border-radius: 24px;
            }
            header h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="form-card">
    <header>
        <h2>Confirm <span>Your Ride</span></h2>
        <p>Gear up for the ultimate adventure in Tangier</p>
    </header>

    {% if message %}
    <div class="message">{{ message }}</div>
    {% endif %}

    <form action="{% url 'page2' %}" method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Select Destination</label>
            <select name="trip_destination" class="form-control" required>
                <option value="" disabled selected>Choose where to ride...</option>
                <option value="أشقار">جولة من مرقالة الى أشقار 180 د.م</option>
                <option value="الغابة الديبلوماسية">جولة من فندق فرح إلى الغابة الديبلوماسية 150 د.م</option>
                <option value="أصيلة">جولة من طنجة إلى أصيلة 280 د.م</option>
                <option value="فنيدق">جولة من طنجة إلى الفنيدق 400 د.م</option>
                <option value="العرائش">جولة من طنجة إلى العرائش 400 د.م</option>
                <option value="بليونيش">جولة من طنجة إلى بليونيش 350 د.م</option>
                <option value="بليونيش">جولة من طنجة إلى المضيق 450 د.م</option>
            </select>
        </div>

        <div class="name-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" class="form-control" placeholder="John" required>
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" class="form-control" placeholder="Doe" required>
            </div>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" class="form-control" placeholder="06XXXXXXXX" required>
        </div>

        <div class="name-row">
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Time</label>
                <input type="time" name="time" class="form-control" required>
            </div>
        </div>

        <div class="form-group">
            <label>Special Requests / Notes</label>
            <textarea name="notes" class="form-control" rows="3" placeholder="Any specific requirements?"></textarea>
        </div>

        <button type="submit" class="btn-submit">Confirm Booking</button>
    </form>

    <footer>
        <p>&copy; 2026 MOTO RAGE. Built by <strong>AE Digital</strong> in Tangier.</p>
        <div class="social-links">
            <a href="https://www.instagram.com/tour.with.drak?igsh=MWdvcW5odW9neTBqMw==" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/212699441179" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </footer>
</div>

</body>
</html>
